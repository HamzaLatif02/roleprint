name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint + Test (Python 3.11)
    runs-on: ubuntu-latest

    # Tests use SQLite in-memory and mock Redis — no service containers needed.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # spaCy model and NLTK data are needed by the NLP tests
      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm --quiet

      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"

      - name: Ruff — check formatting
        run: ruff format --check src/ tests/

      - name: Ruff — lint
        run: ruff check src/ tests/

      - name: Run tests
        env:
          # Safe fallback — tests use SQLite in-memory and mock Redis
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          pytest tests/ -v \
            --cov=src/roleprint \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
